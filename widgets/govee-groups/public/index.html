<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--homey-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif);
      background: transparent;
      color: var(--homey-text-color, white);
      overflow: hidden;
    }

    .widget-container {
      display: flex;
      gap: 8px;
      padding: 8px;
      width: 100%;
      height: 100%;
    }

    .group-tile {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      background: var(--homey-background-color-card, rgba(55, 55, 60, 0.95));
      border-radius: 12px;
      min-width: 0;
      height: 100%;
    }

    .group-header {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    .group-icon {
      font-size: 18px;
      line-height: 1;
      color: #2196F3;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .group-name {
      font-size: var(--homey-font-size-default, 16px);
      font-weight: var(--homey-font-weight-medium, 500);
      line-height: var(--homey-line-height-default, 24px);
      color: var(--homey-text-color, white);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    .button-row {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-shrink: 0;
    }

    .toggle-button {
      flex: 1;
      height: 32px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(80, 80, 85, 0.8);
      color: rgba(255, 255, 255, 0.7);
    }

    .toggle-button:active {
      transform: scale(0.96);
    }

    .toggle-button.on-btn:active {
      background: #2196F3;
      color: white;
    }

    .toggle-button.loading {
      opacity: 0.5;
      pointer-events: none;
    }

    .no-groups {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      padding: 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="widget" class="widget-container">
    <div class="no-groups">Loading...</div>
  </div>

  <script>
    let groups = [];
    let loadingGroups = {};

    function onHomeyReady(Homey) {
      Homey.ready();
      loadGroups();
    }

    function loadGroups() {
      const { group1, group2, group3 } = Homey.getSettings();

      groups = [];
      if (group1 && group1.id) groups.push(group1);
      if (group2 && group2.id) groups.push(group2);
      if (group3 && group3.id) groups.push(group3);

      if (groups.length > 0) {
        renderGroups();
      } else {
        showNoGroups();
      }
    }

    function showNoGroups() {
      document.getElementById('widget').innerHTML = '<div class="no-groups">Select groups in widget settings</div>';
    }

    function renderGroups() {
      const container = document.getElementById('widget');
      container.innerHTML = '';

      groups.forEach(group => {
        const tile = document.createElement('div');
        tile.className = 'group-tile';
        tile.id = `tile-${group.id}`;

        tile.innerHTML = `
          <div class="group-header">
            <span class="group-icon">⬡</span>
            <div class="group-name" title="${escapeHtml(group.name)}">${escapeHtml(group.name)}</div>
          </div>
          <div class="button-row">
            <button class="toggle-button on-btn" onclick="toggleGroup('${group.id}', '${escapeHtml(group.sku)}', true)">ON</button>
            <button class="toggle-button off-btn" onclick="toggleGroup('${group.id}', '${escapeHtml(group.sku)}', false)">OFF</button>
          </div>
        `;

        container.appendChild(tile);
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, function(m) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
      });
    }

    function setButtonsLoading(groupId, isLoading) {
      const tile = document.getElementById(`tile-${groupId}`);
      if (!tile) return;

      const buttons = tile.querySelectorAll('.toggle-button');
      buttons.forEach(btn => {
        if (isLoading) {
          btn.classList.add('loading');
        } else {
          btn.classList.remove('loading');
        }
      });
    }

    function toggleGroup(groupId, sku, state) {
      if (loadingGroups[groupId]) return;

      loadingGroups[groupId] = true;
      setButtonsLoading(groupId, true);

      Homey.api('POST', `/toggle`, { groupId, sku, state })
        .then(() => {
          loadingGroups[groupId] = false;
          setButtonsLoading(groupId, false);
        })
        .catch(() => {
          loadingGroups[groupId] = false;
          setButtonsLoading(groupId, false);
        });
    }
  </script>
</body>
</html>
